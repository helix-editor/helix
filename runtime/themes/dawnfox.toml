[palette]
bg0  = "#f2e9de"   # darker bg (statusline, floats)
bg1  = "#faf4ed"   # default background (rose-pine/dawn base)
bg2  = "#e9e0d5"   # colorcolumn, folds
bg3  = "#e2dad1"   # cursor line
bg4  = "#c8c0bb"   # conceal, border, indent-guide
fg0  = "#4d4451"   # slightly lighter fg (rare use)
fg1  = "#575279"   # default foreground (rose-pine/dawn text)
fg2  = "#6f6a86"   # statusline, brackets, operators
fg3  = "#9b9abe"   # line numbers, fold columns, inactive text
sel0 = "#e5ddd5"   # visual selection bg, popup bg
sel1 = "#c4bcb8"   # search highlight bg, popup selected bg
comment = "#9d8fa9"
black        = "#575279"   # base   — same as fg1
black_bright = "#6f6a86"   # bright — fg2
black_dim    = "#3d3a54"   # dim
red          = "#b4637a"   # base
red_bright   = "#cb7d91"   # bright
red_dim      = "#9c5068"   # dim
green        = "#286983"   # base
green_bright = "#3d8096"   # bright
green_dim    = "#1d5570"   # dim
yellow        = "#ea9d34"  # base
yellow_bright = "#f0b460"  # bright
yellow_dim    = "#cc851a"  # dim
blue          = "#56949f"  # base
blue_bright   = "#6ba9b6"  # bright
blue_dim      = "#456e79"  # dim
magenta        = "#907aa9" # base
magenta_bright = "#a690bd" # bright
magenta_dim    = "#7a649a" # dim
cyan           = "#56949f" # base
cyan_bright    = "#6ba9b6" # bright
cyan_dim       = "#456e79" # dim
white          = "#dfdfe0" # base
white_bright   = "#e4e4e6" # bright
white_dim      = "#cbc4bc" # dim
orange = "#ea9d34"   # gold (same hue as yellow, used for constants/numbers)
pink   = "#d685af"   # pink / preproc / special
