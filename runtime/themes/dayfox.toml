[palette]

bg0 = "#e4dcd4"                 # darker bg (statusline, floats) — warm sandy
bg1 = "#f6f2ee"                 # default background — soft warm cream
bg2 = "#eee9e5"                 # colorcolumn, folds
bg3 = "#e5e0db"                 # cursor line
bg4 = "#c4bfbc"                 # conceal, border, indent-guide
fg0 = "#0f1c23"                 # deepest fg (rare use)
fg1 = "#1d344f"                 # default foreground — rich navy
fg2 = "#3a5473"                 # statusline, brackets, operators
fg3 = "#7ba7c2"                 # line numbers, fold columns, inactive text
sel0 = "#d8d3cf"                # visual selection bg, popup bg
sel1 = "#c4bfbc"                # search highlight bg, popup selected bg
comment = "#7f848e"             # muted blue-gray
black = "#1d344f"               # base   — same as fg1
black_bright = "#3a5473"        # bright — fg2
black_dim = "#0f1c23"           # dim    — fg0
red = "#a5222f"                 # base
red_bright = "#c0363e"          # bright
red_dim = "#851318"             # dim
green = "#396847"               # base
green_bright = "#4d8660"        # bright
green_dim = "#295337"           # dim
yellow = "#ac5402"              # base   — warm amber-orange
yellow_bright = "#cc6600"       # bright
yellow_dim = "#8c4200"          # dim
blue = "#4d688e"                # base
blue_bright = "#4e75aa"         # bright
blue_dim = "#485e7d"            # dim
magenta = "#7a4f9f"             # base
magenta_bright = "#9668bb"      # bright
magenta_dim = "#643f81"         # dim
cyan = "#598280"                # base
cyan_bright = "#6e9e9b"         # bright
cyan_dim = "#456562"            # dim
white = "#e6e1e1"               # base
white_bright = "#ece8e8"        # bright
white_dim = "#d5d0d0"           # dim
orange = "#956400"              # warm amber-brown (constants, numbers)
pink = "#e8619d"                # bright pink (preproc, macro, special)
inactive_tab_colors = "#7f848e"
